name: Build KernelSU Module

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: stable
  ANDROID_NDK_PACKAGE: android-ndk-r27d-linux.zip
  ANDROID_NDK_DIR: android-ndk-r27d
  ANDROID_NDK_SHA1: 22105e410cf29afcf163760cc95522b9fb981121
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Setup NDK
        run: |
          wget -O ndk.zip "https://dl.google.com/android/repository/${ANDROID_NDK_PACKAGE}" -nv
          echo "${ANDROID_NDK_SHA1}  ndk.zip" | sha1sum -c -
          unzip -q ndk.zip -d "$HOME"
          mv "$HOME/${ANDROID_NDK_DIR}" "$HOME/ndk"
      - name: Setup Rust toolchains
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add aarch64-linux-android --toolchain "$RUST_TOOLCHAIN"
          rustup component add rustfmt --toolchain "$RUST_TOOLCHAIN"
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib
          cargo install --locked cargo-ndk
      - name: Check formatting
        run: |
          cd okrmng
          cargo fmt --all --check
          cd ../oukaro
          cargo fmt --all --check
      - name: Test okrmng
        run: |
          cd okrmng
          cargo test
      - name: Test oukaro
        run: |
          cd oukaro
          cargo test
      - name: Build module binaries
        run: |
          export ANDROID_NDK_HOME="$HOME/ndk"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          cd oukaro
          cargo ndk -t arm64-v8a build --release
          cp target/aarch64-linux-android/release/oukaro ../module/
      - name: Build okrmng
        run: |
          export ANDROID_NDK_HOME="$HOME/ndk"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          cd okrmng
          cargo ndk -t arm64-v8a build --release
          cp target/aarch64-linux-android/release/okrmng ../module/
      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build
      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: oukaromanager-module
          path: module/
          retention-days: 30
